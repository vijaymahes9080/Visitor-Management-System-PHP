<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visitor Management System</title>
  <link rel="stylesheet" href="BootStrap/css/bootstrap.min.css">
  <style>
    body {
      background-color: #f7f9fa;
    }
    #img {	
      position: relative;
      left: 25%;
      height: 30%;
    }
    #login {     
      position: relative;
      left: 35%;
      text-align: center; 
      width: 40%;
      height: 50%;
      padding-top: 25px;
      background: unset;
    }
    #submitBtn {
      width: 100px;
    }	
    #head {
      position: relative;
      text-align: left;
    }	
    #form {
      position: absolute;
      padding-top: 40px;
      padding-bottom: 40px;
      padding-left: 45px;
      padding-right: 45px;
      border: 5px solid #747474;
      border-radius: 10px;
      background-color: #ffffff;
    }	
    #error {
      font-size: 14px;
      color: #FF0000;
      padding-bottom: 2px;
      min-height: 20px;
    }
    .group { 
      position: relative; 
      margin-bottom: 35px; 
    }
    input {
      font-size: 18px;
      padding: 10px 10px 10px 5px;
      display: block;
      width: 300px;
      border: none;
      border-bottom: solid 2.5px #757575;
    }
    input:focus { outline: none; }
    label {
      color: #999; 
      padding-top: 5px;
      font-size: 18px;
      font-weight: normal;
      position: absolute;
      pointer-events: none;
      left: 5px;
      top: 10px;
      transition: 0.2s ease all; 
    }
    input:focus ~ label, input:not(:placeholder-shown) ~ label {
      top: -25px;
      font-size: 14px;
      color: #5264AE;
    }
    .bar { position: relative; display: block; width: 300px; }
    .bar:before, .bar:after {
      content: '';
      height: 2px; 
      width: 0;
      bottom: 1px; 
      position: absolute;
      background: #5264AE; 
      transition: 0.2s ease all; 
    }
    .bar:before {
      left: 50%;
    }
    .bar:after {
      right: 50%; 
    }
    input:focus ~ .bar:before, input:focus ~ .bar:after {
      width: 50%;
    }
  </style>
  <script src="vms-static-db.js"></script>
</head>
<body>

<div id="login">
  <div id="head">
    <h2>Visitor Management System</h2>
  </div>
  <div id="form">
    <p id="error"></p>
    <form id="loginForm">
      <div class="group">      
        <input autocomplete="off" type="text" name="username" placeholder=" " required>
        <span class="highlight"></span>
        <span class="bar"></span>
        <label>Username</label>
      </div>
      <div class="group">      
        <input autocomplete="off" type="password" name="pass" placeholder=" " required>
        <span class="highlight"></span>
        <span class="bar"></span>
        <label>Password</label>
      </div>
      <button style="float:left; width:90px" class="btn btn-large btn-success" type="submit">Login</button>
      <div style="margin-top: 60px; text-align: left; font-size: 13px; color: #555; border-top: 1px solid #eee; padding-top: 10px; clear: both;">
        <strong>Demo Credentials (Static Web Page):</strong><br>
        Username: <code>vijay</code><br>
        Password: <code>vijay</code>
      </div>
    </form>
  </div>
</div>	

<script>
  // Redirect to dashboard if session already exists
  if (localStorage.getItem(VMS_SESSION_KEY)) {
    window.location.href = "front.html";
  }

  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const user = this.username.value;
    const pass = this.pass.value;
    const success = loginUser(user, pass);
    if (success) {
      window.location.href = "front.html";
    } else {
      document.getElementById("error").textContent = "Invalid Password or Username";
    }
  });
</script>
</body>
</html>
