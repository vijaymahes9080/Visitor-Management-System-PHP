<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Visitor Logs</title>
  <link rel="stylesheet" href="BootStrap/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="navbar3.css">
  <script src="BootStrap/js/jQuery.min.js"></script>
  <script src="BootStrap/js/bootstrap.min.js"></script>
  <script src="vms-static-db.js"></script>
  <style>
    body { 
      width: 100%;
      background-color: #f7f9fa;
    }
    #body {
      padding-left: 30px;
      padding-top: 15px;
    }
    table {
      border-collapse: collapse;
      background-color: #fff;
    }
    th, td {
      padding: 12px;
      text-align: left;
    }
    .FormLabel {
      padding-top: 20px;
    }
    .FormLabel input[type="radio"] {
      float: right;
    }
    #button {
      padding-top: 20px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-default">
  <div class="container-fluid">
    <div class="navbar-header">
      <a class="navbar-brand" href="#" id="li">Logged in as: <span id="usernameDisplay"></span></a>
    </div>
    <ul class="nav navbar-nav navbar-right">
      <li><a href="front.html" id="li">Home</a></li>
      <li><a href="myform.html" id="li">Add Visitor</a></li>
      <li><a href="logoutform.html" id="li">Checked Out Visitors</a></li>
      <li class="active"><a href="query_data.html">View Data</a></li> 
      <li><a href="javascript:void(0)" onclick="logoutUser()" id="li">Logout</a></li> 
    </ul>
  </div>
</nav>

<div id="body">
  <div class="row" style="padding-bottom: 40px; margin-left: -30px;">
    <!-- Left panel: Filters -->
    <div class="col-sm-3" style="border-right: 1px solid #ddd; padding-left: 30px; background-color: rgba(35, 213, 216, 0.1); min-height: 450px;">	
      <h2>Search By</h2>
      <form id="searchForm" style="padding-top:20px;">
        <div class="FormLabel" style="border-top: 1px solid #ccc; padding-bottom: 10px;">		
          <label for="allData">View All Entries:</label>
          <input type="radio" id="allData" name="searchType" value="all" checked onclick="disableDateFields()">
        </div>
        <div class="FormLabel" style="border-top: 1px solid #ccc; padding-bottom: 10px;">
          <label for="active">View Active Visitors:</label>
          <input type="radio" name="searchType" id="active" value="active" onclick="disableDateFields()">
        </div>
        <div style="border-bottom: 1px solid #ccc; padding-bottom: 15px; border-top: 1px solid #ccc;">
          <div class="FormLabel">
            <label for="bydate">Search By Date:</label>
            <input type="radio" id="bydate" name="searchType" value="dates" onclick="enableDateFields()">
          </div>
          <div style="margin-top: 10px;">
            <div class="form-group">
              <label for="dateStart" style="font-size: 12px;">Start Date:</label>
              <input type="date" id="dateStart" name="dateStart" class="form-control" disabled required /> 
            </div>
            <div class="form-group">
              <label for="dateEnd" style="font-size: 12px;">End Date:</label>
              <input type="date" id="dateEnd" name="dateEnd" class="form-control" disabled required />
            </div>
          </div>
        </div>
        <div id="button">
          <button type="submit" class="btn btn-success btn-block"><span class="glyphicon glyphicon-search"></span>&nbsp;Search</button>
        </div>
      </form>
    </div>

    <!-- Right panel: Results Table -->
    <div class="col-sm-9" style="padding-left: 30px; padding-right: 30px;">
      <h2>Visitor Logs</h2>
      <div class="table-responsive" style="margin-top: 20px;">
        <table class="table table-bordered table-striped" id="logsTable">
          <thead>
            <tr style="background-color: #23d5d8; color: #fff;">
              <th>Serial</th>
              <th>Name</th>
              <th>Contact</th>
              <th>Purpose</th>
              <th>Meeting To</th>
              <th>Time In</th>
              <th>Time Out</th>
              <th>Date</th>
              <th>Status</th>
              <th>Receipt ID</th>
            </tr>
          </thead>
          <tbody id="logsTableBody">
            <!-- Populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // Session Security Check
  const username = checkSession();
  if (username) {
    document.getElementById("usernameDisplay").textContent = username;
  }

  // Date Range Validation helper
  document.getElementById("dateStart").addEventListener("input", function() {
    if (this.value) {
      document.getElementById("dateEnd").setAttribute("min", this.value);
    }
  });

  function enableDateFields() {
    document.getElementById("dateStart").disabled = false;
    document.getElementById("dateEnd").disabled = false;
  }

  function disableDateFields() {
    document.getElementById("dateStart").disabled = true;
    document.getElementById("dateEnd").disabled = true;
  }

  // Render logs
  function renderLogs(searchType, startD, endD) {
    const all = getVisitors();
    let filtered = [];

    if (searchType === "all") {
      filtered = all;
    } else if (searchType === "active") {
      filtered = all.filter(v => v.Status === "ONLINE");
    } else if (searchType === "dates") {
      if (startD && endD) {
        filtered = all.filter(v => {
          return v.Date >= startD && v.Date <= endD;
        });
      } else {
        filtered = all;
      }
    }

    const tbody = document.getElementById("logsTableBody");
    tbody.innerHTML = "";

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted">No visitor records match the search criteria.</td></tr>';
      return;
    }

    // Sort descending by Serial
    filtered.sort((a, b) => b.Serial - a.Serial);

    filtered.forEach(visitor => {
      const tr = document.createElement("tr");
      
      const statusLabel = visitor.Status === "ONLINE" 
        ? '<span class="label label-success">ONLINE</span>' 
        : '<span class="label label-danger">OFFLINE</span>';

      tr.innerHTML = `
        <td>${visitor.Serial}</td>
        <td><strong>${visitor.Name}</strong></td>
        <td>${visitor.Contact}</td>
        <td>${visitor.Purpose}</td>
        <td>${visitor.meetingTo}</td>
        <td>${visitor.TimeIN}</td>
        <td>${visitor.Status === "ONLINE" ? '-' : visitor.TimeOUT}</td>
        <td>${visitor.Date}</td>
        <td>${statusLabel}</td>
        <td>${visitor.ReceiptID}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Handle search submission
  document.getElementById("searchForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const type = this.searchType.value;
    const start = this.dateStart.value;
    const end = this.dateEnd.value;
    renderLogs(type, start, end);
  });

  // Default display on load
  renderLogs("all");
</script>
</body>
</html>
